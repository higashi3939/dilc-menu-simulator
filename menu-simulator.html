<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DILC Menu Simulator v8</title>
<style>
:root {
  --bg:        #0d1117; --surface:  #161b22;
  --border:    #21262d; --border-hi:#30363d;
  --text:      #c9d1d9; --text-dim: #484f58; --text-muted:#8b949e;
  --accent:    #58a6ff;
  --mode-s:    #58a6ff; --mode-m:   #f0403a;
  --font-mono:'Courier New',monospace;
  --font-ui:  'Segoe UI','Helvetica Neue',sans-serif;
  --scr-w:520px; --scr-h:346px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);
  min-height:100vh;display:flex;flex-direction:column;padding:20px;gap:20px}

/* ── Header ── */
header{display:flex;align-items:center;gap:10px;padding-bottom:14px;
  border-bottom:1px solid var(--border);flex-wrap:wrap}
header h1{font-family:var(--font-mono);font-size:13px;color:var(--accent);
  letter-spacing:.12em;text-transform:uppercase}
.badge{font-family:var(--font-mono);font-size:10px;padding:2px 6px;
  border-radius:2px;font-weight:bold}
.bv{background:var(--accent);color:#000}
.bf{background:transparent;border:1px solid var(--mode-m);color:var(--mode-m)}

/* lang toggle */
.lang-toggle{margin-left:auto;display:flex;gap:0;border:1px solid var(--border-hi);
  border-radius:3px;overflow:hidden}
.lang-btn{font-family:var(--font-mono);font-size:10px;padding:4px 10px;
  cursor:pointer;border:none;background:transparent;color:var(--text-muted);
  transition:all .1s;letter-spacing:.06em}
.lang-btn.active{background:var(--accent);color:#000;font-weight:bold}

/* ── Layout ── */
.workspace{display:grid;grid-template-columns:auto 1fr 260px;gap:20px;align-items:start}

/* ── Device col ── */
.device-col{display:flex;flex-direction:column;align-items:center;gap:10px}
.col-label{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);
  letter-spacing:.15em;text-transform:uppercase;align-self:flex-start}

/* Mode switch */
.mode-sw{width:calc(var(--scr-w) + 20px);display:flex;
  background:#0d1219;border:1px solid #1e2830;border-radius:5px 5px 0 0;overflow:hidden}
.mode-btn{flex:1;height:28px;display:flex;align-items:center;justify-content:center;
  gap:5px;font-family:var(--font-mono);font-size:10px;font-weight:bold;letter-spacing:.08em;
  cursor:pointer;border:none;background:transparent;color:var(--text-dim);
  user-select:none;position:relative;transition:color .15s,background .15s}
.mode-btn.as{color:var(--mode-s);background:rgba(88,166,255,.08)}
.mode-btn.am{color:var(--mode-m);background:rgba(240,64,58,.08)}
.mode-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;
  height:2px;border-radius:1px 1px 0 0;background:transparent;transition:background .15s}
.mode-btn.as::after{background:var(--mode-s)}
.mode-btn.am::after{background:var(--mode-m)}
.mode-div{width:1px;background:#1e2830;flex-shrink:0}
.rec-dot{width:7px;height:7px;border-radius:50%;background:var(--mode-m);
  opacity:0;transition:opacity .2s}
.mode-btn.am .rec-dot{opacity:1;animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Camera body */
.cam-body{background:#1a1a1e;border:2px solid #2a2a32;border-top:none;
  border-radius:0 0 6px 6px;padding:10px 10px 14px;
  box-shadow:0 4px 24px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.03);
  width:calc(var(--scr-w) + 20px)}

/* LCD */
.lcd{width:var(--scr-w);height:var(--scr-h);background:#080c10;
  border:1px solid #0a0f15;border-radius:2px;overflow:hidden;position:relative;
  font-family:var(--font-mono);box-shadow:inset 0 0 30px rgba(0,0,0,.8);
  display:flex;flex-direction:column}


/* Tab bar */
.tab-bar{display:flex;height:34px;background:#060a0d;border-bottom:1px solid #111820;flex-shrink:0}
.main-tab{flex:1;display:flex;align-items:center;justify-content:center;
  font-size:0;/* テキスト非表示 */
  cursor:pointer;position:relative;user-select:none;gap:0;
  transition:background .12s;}
.main-tab.act{background:var(--tc,#fff);}
/* タブアイコン: idle はグレー単色、active はタブカラー背景に白抜き
   SVG 内では fill="currentColor" で外形を、fill="var(--icon-bg)" で内側のくり抜きを表現 */
.tab-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  color:#9097a0;--icon-bg:#060a0d;transition:color .15s;}
.main-tab.act .tab-icon{color:#fff;--icon-bg:var(--tc,#fff);}
.tab-icon svg{width:20px;height:20px;}

/* Sub-tab bar */
.sub-bar{display:flex;flex-direction:column;flex-shrink:0;
  background:#050810;border-bottom:1px solid #0d1520;}
.sub-tabs-row{display:flex;align-items:center;justify-content:flex-start;
  gap:4px;padding:4px 10px 5px;}
.sub-tab{width:20px;height:8px;border-radius:1px;border:1px solid #1a2530;
  cursor:pointer;user-select:none;flex-shrink:0;background:transparent}
.sub-tab.act{border-color:var(--tc,#58a6ff);background:var(--tc,#58a6ff)}
.sub-info-row{display:flex;align-items:center;justify-content:space-between;
  padding:0px 10px 4px;}
.sub-lbl{font-size:11px;color:var(--tc,#58a6ff);letter-spacing:.04em;font-weight:bold;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sub-pgnum{font-size:11px;color:#3a5060;font-family:var(--font-mono);
  white-space:nowrap;flex-shrink:0;}

/* Items */
.items-area{flex:1;overflow:hidden;padding:2px 0}
.mrow{display:flex;align-items:center;height:32px;padding:0 20px 0 20px;
  cursor:pointer;position:relative;
  border:1px solid transparent;
  border-left:10px solid transparent;}
.mrow.sel{
  background:rgba(255,255,255,.04);
  border-top:1px solid var(--tc,#58a6ff);
  border-bottom:1px solid var(--tc,#58a6ff);
  border-left:10px solid var(--tc,#58a6ff);
  border-right:10px solid var(--tc,#58a6ff);}
.mrow.dis{opacity:.35;pointer-events:none}
.rl{flex:0 0 50%;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrow.sel .rl{color:#fff}
.rv{flex:0 0 50%;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}
.lcd.mm .rv{color:var(--text)}

/* Status bar */
.stat-bar{height:26px;display:flex;align-items:center;justify-content:space-between;
  padding:0 10px;background:#050810;border-top:1px solid #0d1520;
  font-size:11px;color:#2a3a4a;flex-shrink:0}

/* Dialog */
.ov{position:absolute;inset:0;background:rgba(4,8,12,.93);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:16px}
.dbox{border:1px solid var(--tc,#58a6ff);background:#060e18;padding:14px 16px;
  width:100%;max-width:380px;border-radius:2px}
.dtit{font-size:12px;font-weight:bold;color:var(--tc,#58a6ff);
  border-bottom:1px solid #0d1520;padding-bottom:6px;margin-bottom:10px}
.dbody{font-size:12px;color:var(--text);margin-bottom:12px;white-space:pre-line;line-height:1.6}
.dopts{display:flex;flex-direction:column;gap:2px;margin-bottom:12px}
.dopt{font-size:12px;padding:3px 8px;color:var(--text-muted);cursor:pointer;
  border-radius:1px;display:flex;align-items:center;gap:8px}
.dopt.sel{background:rgba(255,255,255,.07);color:#fff}
.dbullet{color:var(--tc,#58a6ff);font-size:11px}
.dbtns{display:flex;gap:8px;justify-content:flex-end}
.dbtn{font-family:var(--font-mono);font-size:11px;padding:3px 12px;
  border-radius:1px;cursor:pointer;border:1px solid}
.dbtn.ok{border-color:var(--tc,#58a6ff);color:var(--tc,#58a6ff);background:rgba(88,166,255,.08)}
.dbtn.ca{border-color:#2a3a4a;color:#3a5060;background:transparent}

/* Control pad */
.cpad{margin-top:10px;display:grid;
  grid-template-areas:". up ." "left ok right" "back down .";
  grid-template-columns:repeat(3,46px);grid-template-rows:repeat(3,32px);
  gap:4px;justify-content:center}
.cb{background:#141820;border:1px solid #1e2830;border-radius:4px;
  color:var(--text-dim);font-size:13px;font-family:var(--font-mono);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  user-select:none;transition:background .08s,color .08s,border-color .08s}
.cb:hover{background:#1c2530;color:var(--text-muted);border-color:#2a3a4a}
.cb:active,.cb.fl{background:#58a6ff;color:#000;border-color:#58a6ff}
.cb[data-k="up"]{grid-area:up}.cb[data-k="left"]{grid-area:left}
.cb[data-k="enter"]{grid-area:ok;font-size:9px;font-weight:bold;
  background:#0a1a0a;border-color:#1a4020;color:#40c060}
.cb[data-k="enter"]:hover{background:#102010}
.cb[data-k="enter"]:active,.cb[data-k="enter"].fl{background:#40c060;color:#000;border-color:#40c060}
.cb[data-k="right"]{grid-area:right}.cb[data-k="down"]{grid-area:down}
.cb[data-k="back"]{grid-area:back;font-size:9px;background:#1a0a0a;border-color:#401a1a;color:#c04040}
.cb[data-k="back"]:hover{background:#200e0e}
.cb[data-k="back"]:active,.cb[data-k="back"].fl{background:#c04040;color:#000;border-color:#c04040}

/* Control pad area: cpad + side buttons */
.cpad-area{margin-top:10px;display:flex;align-items:center;justify-content:center;gap:14px;}
.cpad-area .cpad{margin-top:0}
.cpad-side{display:flex;flex-direction:column;gap:6px}
.ss-btn{background:#141820;border:1px solid #1e2830;border-radius:4px;
  color:var(--text-dim);font-size:11px;font-family:var(--font-mono);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:54px;height:54px;gap:2px;
  user-select:none;transition:background .08s,color .08s,border-color .08s}
.ss-btn:hover{background:#1c2530;color:var(--text-muted);border-color:#2a3a4a}
.ss-btn:active{background:#58a6ff;color:#000;border-color:#58a6ff}
.ss-btn .ss-icon{font-size:18px;line-height:1}
.ss-btn .ss-lbl{font-size:9px;letter-spacing:.04em}

/* Key guide */
.kguide{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);
  line-height:1.9;padding:8px 10px;border:1px solid var(--border);
  border-radius:4px;background:var(--surface);width:100%}
.kguide kbd{display:inline-block;background:#1c2530;border:1px solid #2a3a4a;
  border-radius:2px;padding:0 4px;color:var(--accent);font-size:9px;line-height:1.6}

/* Editor */
.editor-col{display:flex;flex-direction:column;gap:10px}
.sec-lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);
  letter-spacing:.15em;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:5px}
textarea#ed{background:var(--surface);border:1px solid var(--border);border-radius:4px;
  color:var(--text);font-family:var(--font-mono);font-size:11px;line-height:1.6;
  padding:10px;resize:vertical;outline:none;min-height:320px;transition:border-color .15s}
textarea#ed:focus{border-color:var(--accent)}
textarea#ed.err{border-color:#d04040}
.errmsg{font-family:var(--font-mono);font-size:10px;color:#d04040;
  background:rgba(208,64,64,.05);border:1px solid rgba(208,64,64,.2);
  border-radius:3px;padding:5px 8px;display:none}
.errmsg.show{display:block}
.brow{display:flex;gap:6px;flex-wrap:wrap}
.btn{font-family:var(--font-mono);font-size:10px;padding:5px 12px;border-radius:3px;
  cursor:pointer;border:1px solid;transition:all .1s;letter-spacing:.04em}
.bp{background:rgba(88,166,255,.1);border-color:var(--accent);color:var(--accent)}
.bp:hover{background:rgba(88,166,255,.2)}
.bs{background:transparent;border-color:var(--border-hi);color:var(--text-muted)}
.bs:hover{border-color:var(--text-muted);color:var(--text)}
.bd{background:transparent;border-color:#d04040;color:#d04040}
.bd:hover{background:rgba(208,64,64,.08)}

/* Log */
.log-col{display:flex;flex-direction:column;gap:10px}
.logp{background:var(--surface);border:1px solid var(--border);border-radius:4px;
  padding:8px;font-family:var(--font-mono);font-size:10px;overflow-y:auto;
  min-height:180px;max-height:280px}
.le{display:flex;gap:6px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.02);line-height:1.5}
.lts{color:var(--text-dim);flex-shrink:0}
.la{flex-shrink:0;width:58px}
.lm{color:var(--text-muted);word-break:break-all}
.l-nav .la{color:var(--accent)}.l-tab .la{color:#b08000}
.l-mode .la{color:var(--mode-m)}.l-enter .la{color:#40c060}
.l-back .la{color:#d04040}.l-set .la{color:#9040c0}
.l-info .la{color:var(--text-dim)}

.statep{background:var(--surface);border:1px solid var(--border);border-radius:4px;
  padding:8px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);line-height:1.8}
.sr{display:flex;gap:6px}
.sk{color:var(--text-dim);width:72px;flex-shrink:0}
.sv{color:var(--text)}
</style>
</head>
<body>

<header>
  <h1>DILC Menu Simulator</h1>
  <span class="badge bv">v8.0</span>
  <span class="badge bf">📷/🎬 Stills · Movie</span>
  <!-- 言語切替 -->
  <div class="lang-toggle">
    <button class="lang-btn active" id="btnJa" onclick="setLang('ja')">日本語</button>
    <button class="lang-btn"        id="btnEn" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="workspace">
  <!-- Device -->
  <div class="device-col">
    <span class="col-label" id="lbl-device">// デバイスプレビュー</span>
    <div class="mode-sw">
      <button class="mode-btn as" id="btnStills" onclick="switchMode('stills')">
        <span>📷</span><span id="lbl-stills">静止画</span>
      </button>
      <div class="mode-div"></div>
      <button class="mode-btn" id="btnMovie" onclick="switchMode('movie')">
        <span class="rec-dot"></span>
        <span>🎬</span><span id="lbl-movie">動画</span>
      </button>
    </div>
    <div class="cam-body">
      <div class="lcd" id="lcd">
        <div class="tab-bar"   id="tabBar"></div>
        <div class="sub-bar"   id="subBar"></div>
        <div class="items-area" id="itemsArea"></div>
        <div class="stat-bar">
          <span id="hintL">SET:変更  MENU:戻る</span>
          <span id="hintR">↑↓:移動  ←→:タブ</span>
        </div>
      </div>
      <div class="cpad-area">
        <div class="cpad">
          <button class="cb" data-k="up">▲</button>
          <button class="cb" data-k="left">◀</button>
          <button class="cb" data-k="enter">SET</button>
          <button class="cb" data-k="right">▶</button>
          <button class="cb" data-k="down">▼</button>
          <button class="cb" data-k="back">MENU</button>
        </div>
        <div class="cpad-side">
          <button class="ss-btn" id="btnScreenshot" onclick="takeScreenshot()" title="液晶画面をPNGで保存">
            <span class="ss-icon">📸</span>
            <span class="ss-lbl" id="lbl-screenshot">保存</span>
          </button>
        </div>
      </div>
    </div>
    <div class="kguide" id="kguide">
      <kbd>←</kbd><kbd>→</kbd> タブ切替 &nbsp;<kbd>↑</kbd><kbd>↓</kbd> 項目移動<br>
      <kbd>Enter</kbd> 値変更（SET）&nbsp;<kbd>Esc</kbd> 戻る（MENU）<br>
      <kbd>M</kbd> 静止画/動画 切替 &nbsp;<kbd>L</kbd> 言語切替
    </div>
  </div>

  <!-- Editor -->
  <div class="editor-col">
    <span class="sec-lbl" id="lbl-editor">// メニュー定義 (JSON)</span>
    <textarea id="ed" spellcheck="false"></textarea>
    <div class="errmsg" id="errmsg"></div>
    <div class="brow">
      <button class="btn bp" onclick="applyJson()" id="btn-apply">▶ 適用</button>
      <button class="btn bs" onclick="resetSim()"  id="btn-reset">↺ リセット</button>
      <button class="btn bs" onclick="loadSample()" id="btn-sample">サンプル読込</button>
      <button class="btn bd" onclick="clearLog()"  id="btn-clear">ログ消去</button>
    </div>
  </div>

  <!-- Log -->
  <div class="log-col">
    <span class="sec-lbl" id="lbl-log">// ナビゲーションログ</span>
    <div class="logp" id="logp"></div>
    <span class="sec-lbl" id="lbl-state">// 現在の状態</span>
    <div class="statep" id="statep"></div>
  </div>
</div>

<script>
/* ╔══════════════════════════════════════════════════════════════╗
   ║  SECTION 1: CONSTANTS & DATA                                  ║
   ║  UI多言語ラベル / SAMPLEメニューデータ（静止画・動画）                            ║
   ╚══════════════════════════════════════════════════════════════╝ */

'use strict';

/* ── 多言語ラベル定義 ── */
const UI = {
  ja:{
    device:'// デバイスプレビュー', stills:'静止画', movie:'動画',
    editor:'// メニュー定義 (JSON)', log:'// ナビゲーションログ', state:'// 現在の状態',
    apply:'▶ 適用', reset:'↺ リセット', sample:'サンプル読込', clear:'ログ消去',
    hintL:'SET:変更  MENU:戻る', hintR:'↑↓:移動  ←→:タブ',
    kguide:'<kbd>←</kbd><kbd>→</kbd> タブ切替 &nbsp;<kbd>↑</kbd><kbd>↓</kbd> 項目移動<br><kbd>Enter</kbd> 値変更（SET）&nbsp;<kbd>Esc</kbd> 戻る（MENU）<br><kbd>M</kbd> 静止画/動画 切替 &nbsp;<kbd>L</kbd> 言語切替',
    mode_stills:'静止画モードに切替', mode_movie:'動画モードに切替', reset_msg:'シミュレーターをリセット',
    load_ok:'メニュー定義を更新', close:'ダイアログを閉じる',
    action_note:'（アクション実行ポイント）\nここに実装を追加できます',
    screenshot:'保存', screenshot_ok:'PNGを保存', screenshot_err:'スクリーンショット失敗',
  },
  en:{
    device:'// Device Preview', stills:'Stills', movie:'Movie',
    editor:'// Menu Definition (JSON)', log:'// Navigation Log', state:'// Current State',
    apply:'▶ Apply', reset:'↺ Reset', sample:'Load Sample', clear:'Clear Log',
    hintL:'SET:Change  MENU:Back', hintR:'↑↓:Move  ←→:Tab',
    kguide:'<kbd>←</kbd><kbd>→</kbd> Tab &nbsp;<kbd>↑</kbd><kbd>↓</kbd> Move<br><kbd>Enter</kbd> Change（SET）&nbsp;<kbd>Esc</kbd> Back（MENU）<br><kbd>M</kbd> Stills/Movie &nbsp;<kbd>L</kbd> Language',
    mode_stills:'Switched to Stills', mode_movie:'Switched to Movie', reset_msg:'Simulator reset',
    load_ok:'Menu definition updated', close:'Dialog closed',
    action_note:'(Action point)\nAdd implementation here.',
    screenshot:'Save', screenshot_ok:'PNG saved', screenshot_err:'Screenshot failed',
  }
};

/* ── EOS R5 Mark II メニュー定義 / 出典: cam.start.canon 公式マニュアル / 各項目: { id, ja, en, type, value, options:{ja:[],en:[]} or string } ── */
const SAMPLE = {

/* ────────── 静止画モード ────────── */
stills:{ tabs:[
  {
    id:'shoot', ja:'撮影', en:'Shoot', color:'#d04040',
    pages:[
      { page:1, ja:'画質/サイズ', en:'Image quality/size', items:[
        { id:'s1_1', ja:'JPEG/HEIF画質',    en:'JPEG/HEIF quality',   type:'select', value:'ファイン/Fine',
          options:{ ja:['ラージファイン','ファイン','ノーマル'], en:['Large fine','Fine','Normal'] }},
        { id:'s1_2', ja:'画像タイプ/サイズ', en:'Img type/size',        type:'select', value:'RAW',
          options:{ ja:['RAW','CRAW','RAW+L','RAW+M','RAW+S1','L','M','S1','S2'], en:['RAW','CRAW','RAW+L','RAW+M','RAW+S1','L','M','S1','S2'] }},
        { id:'s1_3', ja:'トリミング/アスペクト比', en:'Cropping/aspect ratio', type:'select', value:'フルサイズ/Full-frame',
          options:{ ja:['フルサイズ','1.6x(クロップ)','1:1','4:3','16:9'], en:['Full-frame','1.6x(crop)','1:1','4:3','16:9'] }},
      ]},
      { page:2, ja:'露出', en:'Exposure', items:[
        { id:'s2_1', ja:'露出補正/AEB',      en:'Expo.comp./AEB',         type:'display', value:'0' },
        { id:'s2_2', ja:'ISO感度設定',        en:'ISO speed settings',     type:'action',  value:'→' },

/* ╔══════════════════════════════════════════════════════════════╗
   ║  SECTION 2: STATE & HELPERS                                   ║
   ║  状態変数 / ショートカット関数                                            ║
   ╚══════════════════════════════════════════════════════════════╝ */
/* ── 状態 ── */
let DEF = null, lang = 'ja', mode = 'stills';
let tabIdx=0, pageIdx=0, rowIdx=0, inDialog=false, dOptIdx=0;

const $=id=>document.getElementById(id);
const L=key=>UI[lang][key];

function modeDef()     { return DEF[mode]; }
function currentTab()  { return modeDef().tabs[tabIdx]; }
function currentPage() { return currentTab().pages[pageIdx]; }
function currentItems(){ return currentPage().items; }
function currentItem() { return currentItems()[rowIdx]; }
function tabColor()    { return currentTab().color; }
function tlabel(tab)   { return lang==='ja' ? tab.ja  : tab.en; }
function plabel(pg)    { return lang==='ja' ? pg.ja   : pg.en; }
function ilabel(item)  { return lang==='ja' ? item.ja : item.en; }
function ivalue(item)  {
  // value は "日本語/English" 形式なら言語に応じて分割（options 有無を問わない）
  const v = String(item.value);
  if(v.indexOf('/') === -1) return v;
  if(lang==='ja') return v.split('/')[0];
  return v.split('/').slice(1).join('/') || v;
}
function optLabel(item, idx) {
  if(!item.options) return '';
  const arr = item.options[lang] || item.options.ja;
  return arr[idx] || '';
}
function optCount(item) {
  if(!item.options) return 0;
  return (item.options[lang] || item.options.ja).length;
}

/* ── 初期化 ── */
function init() {
  DEF = JSON.parse(JSON.stringify(SAMPLE));
  $('ed').value = JSON.stringify(SAMPLE, null, 2);
  applyUILang();
  resetSim();
  bindKeys();
  bindButtons();
}

/* ── 言語切替 ── */
function setLang(l) {
  lang = l;
  $('btnJa').className = 'lang-btn' + (l==='ja' ? ' active' : '');
  $('btnEn').className = 'lang-btn' + (l==='en' ? ' active' : '');
  applyUILang();
  render();
  if(isMrWizard()) mrRenderAll(); /* ウィザード中も即時反映 */
  if(isTlWizard()) tlRender();   /* タイムラプスウィザード中も即時反映 */
  addLog('info','🌐 LANG', l==='ja'?'日本語に切替':'Switched to English');
}

function applyUILang() {
  $('lbl-device').textContent  = L('device');
  $('lbl-stills').textContent  = L('stills');
  $('lbl-movie').textContent   = L('movie');
  $('lbl-editor').textContent  = L('editor');
  $('lbl-log').textContent     = L('log');
  $('lbl-state').textContent   = L('state');
  $('btn-apply').textContent   = L('apply');
  $('btn-reset').textContent   = L('reset');
  $('btn-sample').textContent  = L('sample');
  $('btn-clear').textContent   = L('clear');
  $('hintL').textContent       = L('hintL');
  $('hintR').textContent       = L('hintR');
  $('kguide').innerHTML        = L('kguide');
  $('lbl-screenshot').textContent = L('screenshot');
}

/* ── モード切替 ── */
function switchMode(m) {
  if(m===mode) return;
  mode=m; tabIdx=0; pageIdx=0; rowIdx=0; inDialog=false; removeDialog();
  const mv=m==='movie';
  $('btnStills').className='mode-btn'+(mv?'':' as');
  $('btnMovie').className ='mode-btn'+(mv?' am':'');
  $('lcd').className      ='lcd'+(mv?' mm':'');
  render();
  addLog('mode', mv?'🎬':'📷', L(mv?'mode_movie':'mode_stills'));
}

/* ── レンダリング ── */
function render() {
  renderTabBar(); renderSubBar(); renderItems(); renderState();
  $('lcd').style.setProperty('--tc', tabColor());
}

/* ── メインタブ SVG アイコン定義 / EOS R5 Mark II 公式マニュアル準拠の単色アイコン
       色は CSS 側で制御:
         - 外形は fill="currentColor" → CSSの color プロパティ (idle=#9097a0 / active=#fff)
         - 内側のくり抜きは fill="var(--icon-bg)" → 親の背景色 (idle=#060a0d / active=タブカラー)
       静止画/動画モードで shoot タブのアイコンは共通 (mrec も同じカメラアイコン) ── */
const TAB_ICONS = {
  /* SHOOT (静止画/動画共通) — カメラ本体: 矩形ボディ + ファインダー突起 + レンズ円 */
  shoot: ()=>`<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 6.5 H18 V17 H2 Z M6.5 6.5 L7 4.8 L13 4.8 L13.5 6.5 Z M13.8 5.3 H15.8 V6.9 H13.8 Z" fill="currentColor"/>
    <circle cx="10" cy="11.7" r="3" fill="var(--icon-bg)"/>
    <circle cx="10" cy="11.7" r="1.6" fill="currentColor"/>
  </svg>`,

  /* AF — 太字テキストのみ */
  af: ()=>`<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
    <text x="10" y="14.5" text-anchor="middle" font-size="11" font-weight="700" font-family="Arial,sans-serif" fill="currentColor">AF</text>
  </svg>`,

  /* PLAY — 角丸矩形 + 中の三角 (▶) */
  play: ()=>`<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="5" width="16" height="10" rx="1.2" fill="currentColor"/>
    <path d="M8 7.5 L13 10 L8 12.5 Z" fill="var(--icon-bg)"/>
  </svg>`,

  /* COMM — ジグザグ波線 (〜風) */
  comm: ()=>`<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 13 L6 7 L10 13 L14 7 L18 13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>`,

  /* SETUP — レンチ (塗りつぶしシルエット) */
  setup: ()=>`<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
    <path d="M14 2 Q17.5 2 17.5 5.5 Q17.5 9 14 9 Q13 9 12.2 8.6 L4.5 16.3 Q3.5 17.3 2.5 16.3 Q1.5 15.3 2.5 14.3 L10.2 6.6 Q9.8 5.8 9.8 4.8 Q9.8 2 13 2 Z" fill="currentColor"/>
  </svg>`,

  /* CTRL — 円 + 抜きの扇形 (円グラフ風ダイヤル) */
  ctrl: ()=>`<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
    <circle cx="10" cy="10" r="7" fill="currentColor"/>
    <path d="M10 10 L10 3 A7 7 0 0 1 16.5 13.5 Z" fill="var(--icon-bg)"/>
  </svg>`,

  /* C.Fn — カメラ背面ビュー: 液晶画面 + 右側ボタン3つ */
  cfn: ()=>`<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="3.5" width="16" height="13" rx="1.5" fill="currentColor"/>
    <rect x="3.2" y="4.7" width="11" height="8" fill="var(--icon-bg)"/>
    <circle cx="16" cy="6" r="0.8" fill="var(--icon-bg)"/>
    <circle cx="16" cy="9" r="0.8" fill="var(--icon-bg)"/>
    <circle cx="16" cy="12" r="0.8" fill="var(--icon-bg)"/>
  </svg>`,

  /* MY — 5角星 */
  my: ()=>`<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 2 L12.2 7.6 L18.4 7.6 L13.6 11.4 L15.5 17.2 L10 13.6 L4.5 17.2 L6.4 11.4 L1.6 7.6 L7.8 7.6 Z" fill="currentColor"/>
  </svg>`,
};
/* 動画モードのタブはアイコンを静止画モードと共通化 (shoot/af/play/comm/setup/ctrl/my) */
TAB_ICONS.mrec  = TAB_ICONS.shoot;
TAB_ICONS.maf   = TAB_ICONS.af;
TAB_ICONS.mplay = TAB_ICONS.play;
TAB_ICONS.mcomm = TAB_ICONS.comm;
TAB_ICONS.msetup= TAB_ICONS.setup;
TAB_ICONS.mctrl = TAB_ICONS.ctrl;

/* SVG は currentColor を使うので color 引数は不要だが、後方互換のため受け取って無視する */
function getTabIcon(tabId, color) {
  const fn = TAB_ICONS[tabId];
  return fn ? fn() : TAB_ICONS.shoot();
}

function renderTabBar() {
  const bar=$('tabBar'); bar.innerHTML='';
  modeDef().tabs.forEach((tab,i)=>{
    const el=document.createElement('div');
    el.className='main-tab'+(i===tabIdx?' act':'');
    el.style.setProperty('--tc',tab.color);
    const iconWrap=document.createElement('div');
    iconWrap.className='tab-icon';
    iconWrap.innerHTML=getTabIcon(tab.id, tab.color);
    el.appendChild(iconWrap);
    el.addEventListener('click',()=>{tabIdx=i;pageIdx=0;rowIdx=0;render();addLog('tab','◀▶',tlabel(tab));});
    bar.appendChild(el);
  });
}

function renderSubBar() {
  const bar=$('subBar'); bar.innerHTML='';
  const pages=currentTab().pages;

  /* 1行目：矩形タブ群（中央揃え） */
  const tabsRow=document.createElement('div'); tabsRow.className='sub-tabs-row';
  pages.forEach((pg,i)=>{
    const el=document.createElement('div');
    el.className='sub-tab'+(i===pageIdx?' act':'');
    el.style.setProperty('--tc',tabColor());
    el.addEventListener('click',()=>{pageIdx=i;rowIdx=0;render();addLog('tab','PG',`${pg.page}`);});
    tabsRow.appendChild(el);
  });
  bar.appendChild(tabsRow);

  /* 2行目：ページ名（左）＋ページ数（右） */
  const infoRow=document.createElement('div'); infoRow.className='sub-info-row';
  const lbl=document.createElement('div'); lbl.className='sub-lbl';
  lbl.style.setProperty('--tc',tabColor());
  lbl.textContent=plabel(currentPage());
  const pgnum=document.createElement('div'); pgnum.className='sub-pgnum';
  pgnum.textContent=`${pageIdx+1}/${pages.length}`;
  infoRow.appendChild(lbl);
  infoRow.appendChild(pgnum);
  bar.appendChild(infoRow);
}

function renderItems() {
  const area=$('itemsArea'); area.innerHTML='';
  const items=currentItems();
  const ROW_H=32, areaH=346-34-38-26;
  const maxV=Math.floor(areaH/ROW_H);
  const start=Math.max(0,Math.min(rowIdx-Math.floor(maxV/2),items.length-maxV));
  items.slice(start,start+maxV).forEach((item,si)=>{
    const ri=start+si, sel=ri===rowIdx;
    const row=document.createElement('div');
    row.className='mrow'+(sel?' sel':'')+(item.disabled?' dis':'');
    row.style.setProperty('--tc',tabColor());

    /* ラベル */
    const labelEl=document.createElement('span');
    labelEl.className='rl';
    labelEl.textContent=ilabel(item);
    row.appendChild(labelEl);

    /* 値：動画記録サイズ行はSVGアイコン3連、それ以外はテキスト */
    if(item.id==='m1_1' && item.mrData){
      /* fps/圧縮方式アイコンは白固定。解像度アイコンも白に統一 (カーソル位置でも色を変えない) */
      const iconColor = '#fff';
      const valWrap=document.createElement('div');
      valWrap.className='rv';
      valWrap.style.cssText='display:flex;align-items:center;gap:6px;';

      const resWrap=document.createElement('div');
      resWrap.innerHTML=mrIconResSmall(item.mrData.resId, iconColor);
      valWrap.appendChild(resWrap);

      const fpsWrap=document.createElement('div');
      fpsWrap.innerHTML=mrIconFpsSmall(item.mrData.fps, iconColor);
      valWrap.appendChild(fpsWrap);

      const compWrap=document.createElement('div');
      compWrap.innerHTML=mrIconCompSmall(item.mrData.compIconId, iconColor);
      valWrap.appendChild(compWrap);

      row.appendChild(valWrap);
    } else {
      const valEl=document.createElement('span');
      valEl.className='rv';
      valEl.textContent=ivalue(item);
      row.appendChild(valEl);
    }

    row.addEventListener('click',()=>{rowIdx=ri;render();});
    row.addEventListener('dblclick',()=>{rowIdx=ri;execEnter();});
    area.appendChild(row);
  });
}

function renderState() {
  const tab=currentTab(), pg=currentPage(), item=currentItems()[rowIdx];
  const el=$('statep'); el.style.setProperty('--tc',tab.color);
  const mspan=mode==='stills'
    ?`<span style="color:var(--mode-s);font-weight:bold">📷 ${L('stills')}</span>`
    :`<span style="color:var(--mode-m);font-weight:bold">🎬 ${L('movie')}</span>`;
  el.innerHTML=`
    <div class="sr"><span class="sk">Mode</span><span class="sv">${mspan}</span></div>
    <div class="sr"><span class="sk">Tab</span><span class="sv" style="color:${tab.color};font-weight:bold">${esc(tlabel(tab))}</span></div>
    <div class="sr"><span class="sk">Page</span><span class="sv">${pg.page}/${currentTab().pages.length} <span style="color:var(--text-dim)">${esc(plabel(pg))}</span></span></div>
    <div class="sr"><span class="sk">Row</span><span class="sv">${rowIdx+1}/${currentItems().length}</span></div>
    <div class="sr"><span class="sk">Item</span><span class="sv">${esc(item?ilabel(item):'—')}</span></div>
    <div class="sr"><span class="sk">Value</span><span class="sv">${esc(item?ivalue(item):'—')}</span></div>
    <div class="sr"><span class="sk">Type</span><span class="sv">${esc(item?item.type:'—')}</span></div>`;
}


/* ╔══════════════════════════════════════════════════════════════╗
   ║  SECTION 5: CORE — NAVIGATION & DIALOG                        ║
   ║  navUp/Down/Left/Right / execEnter/Back / openDialog / showSelect/Info║
   ╚══════════════════════════════════════════════════════════════╝ */
/* ── ナビゲーション ── */
/* ウィザード中かどうか（動画記録サイズウィザード専用） */
function isMrWizard() { return inDialog && !!document.getElementById('mrWiz'); }
function isTlWizard() { return inDialog && !!document.getElementById('tlWiz'); }

function navUp() {
  if(isMrWizard()){ mrNavUp(); return; }
  if(isTlWizard()){ tlNavUp(); return; }
  if(inDialog){ dUp(); return; }
  const l=currentItems().length; rowIdx=(rowIdx-1+l)%l; render(); addLog('nav','↑ UP',ilabel(currentItem()));
}
function navDown() {
  if(isMrWizard()){ mrNavDown(); return; }
  if(isTlWizard()){ tlNavDown(); return; }
  if(inDialog){ dDown(); return; }
  const l=currentItems().length; rowIdx=(rowIdx+1)%l; render(); addLog('nav','↓ DOWN',ilabel(currentItem()));
}
function navLeft() {
  if(isMrWizard()){ mrNavLeft(); return; }
  if(isTlWizard()){
    if(TLW.editMode==='interval'||TLW.editMode==='shots') tlNavFieldLeft();
    else tlBack();
    return;
  }
  if(inDialog) return;
  if(pageIdx>0){
    pageIdx--; rowIdx=0; render();
    addLog('tab','◀ PG', plabel(currentPage()));
  } else if(tabIdx>0){
    tabIdx--; pageIdx=currentTab().pages.length-1; rowIdx=0; render();
    addLog('tab','◀◀ TAB', tlabel(currentTab()));
  } else {
    /* 先頭 → 末尾へ折り返し */
    tabIdx=modeDef().tabs.length-1; pageIdx=currentTab().pages.length-1; rowIdx=0; render();
    addLog('tab','◀ WRAP', tlabel(currentTab()));
  }
}
function navRight() {
  if(isMrWizard()){ mrNavRight(); return; }
  if(isTlWizard()){
    if(TLW.editMode==='interval'||TLW.editMode==='shots') tlNavFieldRight();
    else tlEnter();
    return;
  }
  if(inDialog) return;
  if(pageIdx<currentTab().pages.length-1){
    pageIdx++; rowIdx=0; render();
    addLog('tab','▶ PG', plabel(currentPage()));
  } else if(tabIdx<modeDef().tabs.length-1){
    tabIdx++; pageIdx=0; rowIdx=0; render();
    addLog('tab','▶▶ TAB', tlabel(currentTab()));
  } else {
    /* 末尾 → 先頭へ折り返し */
    tabIdx=0; pageIdx=0; rowIdx=0; render();
    addLog('tab','▶ WRAP', tlabel(currentTab()));
  }
}
function execEnter() {
  if(isMrWizard()){ mrEnter(); return; }
  if(isTlWizard()){ tlEnter(); return; }
  if(inDialog){ dConfirm(); return; }
  const it=currentItem(); if(!it) return; openDialog(it);
}
function execBack() {
  if(isMrWizard()){ mrBack(); return; }
  if(isTlWizard()){ tlBack(); return; }
  if(inDialog){ closeDialog(); return; }
  addLog('back','MENU','Top level');
}

/* ── ダイアログ表示 / Dialog display ── */
function showSelect(item) {
  removeDialog();
  const ov=document.createElement('div'); ov.className='ov'; ov.id='ov';
  ov.style.setProperty('--tc',tabColor());
  const arr=item.options[lang]||item.options.ja;
  const opts=arr.map((o,i)=>`
    <div class="dopt${i===dOptIdx?' sel':''}" data-i="${i}">
      <span class="dbullet">${i===dOptIdx?'●':'○'}</span>${esc(o)}
    </div>`).join('');
  ov.innerHTML=`<div class="dbox">
    <div class="dtit">${esc(ilabel(item))}</div>
    <div class="dopts" id="dopts">${opts}</div>
    <div class="dbtns">
      <button class="dbtn ca" onclick="closeDialog()">MENU</button>
      <button class="dbtn ok" onclick="dConfirm()">SET</button>
    </div></div>`;
  ov.querySelectorAll('.dopt').forEach(el=>{
    el.addEventListener('click',()=>{dOptIdx=+el.dataset.i;refreshOpts(item);});
    el.addEventListener('dblclick',()=>{dOptIdx=+el.dataset.i;dConfirm();});
  });
  $('lcd').appendChild(ov);
}

function refreshOpts(item) {
  const c=$('dopts'); if(!c) return;
  const arr=item.options[lang]||item.options.ja;
  c.querySelectorAll('.dopt').forEach((el,i)=>{
    el.className='dopt'+(i===dOptIdx?' sel':'');
    el.querySelector('.dbullet').textContent=i===dOptIdx?'●':'○';
  });
}

function showInfo(item, extra='') {
  removeDialog();
  const ov=document.createElement('div'); ov.className='ov'; ov.id='ov';
  ov.style.setProperty('--tc',tabColor());
  ov.innerHTML=`<div class="dbox">
    <div class="dtit">${esc(ilabel(item))}</div>
    <div class="dbody">${esc(extra||ivalue(item))}</div>
    <div class="dbtns"><button class="dbtn ok" onclick="closeDialog()">OK</button></div>
  </div>`;
  $('lcd').appendChild(ov); inDialog=true;
}

function dUp()   { const it=currentItem(); if(!it?.options) return; dOptIdx=(dOptIdx-1+optCount(it)+optCount(it))%optCount(it); refreshOpts(it); }
function dDown() { const it=currentItem(); if(!it?.options) return; dOptIdx=(dOptIdx+1)%optCount(it); refreshOpts(it); }

function dConfirm() {
  const it=currentItem();
  if(it?.options){
    const arr=it.options[lang]||it.options.ja;
    const enArr=it.options.en||it.options.ja;
    const jaArr=it.options.ja;
    // 両言語の値を "/" 結合で保存
    it.value = jaArr[dOptIdx]+'/'+enArr[dOptIdx];
    addLog('set','✓ SET',`${ilabel(it)} = ${arr[dOptIdx]}`);
    /* メイン記録形式 (m1_3) が変更されたときは、動画記録サイズの選択値を整合させる */
    if (it.id === 'm1_3') {
      reconcileAfterMainRecChange();
      /* m1_1 の mrData も新しい MRW 状態に同期する (メニュー行のアイコン3連表示用)。
         ランタイムデータは DEF (SAMPLE のディープコピー) を使う */
      const m1_1 = (DEF?.movie?.tabs?.[0]?.pages?.[0]?.items || []).find(x => x.id === 'm1_1');
      if (m1_1 && m1_1.mrData) {
        const r = mrRes();
        const fps = mrCurrentFps();
        const comp = mrCurrentComp();
        m1_1.mrData = { resId: r.id, fps, compIconId: comp ? comp.iconId : 'std_lgop' };
      }
    }
  }
  closeDialog(); render();
}

function closeDialog(){ inDialog=false; removeDialog(); addLog('back','CLOSE',L('close')); }


/* ── ダイアログ ── */
function openDialog(item) {
  if(item.type==='display'){addLog('enter','DISP',`${ilabel(item)}: ${ivalue(item)}`);showInfo(item);return;}
  /* ── 動画記録サイズ専用ウィザード ── */
  if(item.type==='action' && item.id==='m1_1'){
    addLog('enter','🎬 REC',ilabel(item));
    showMovieRecWizard(item); inDialog=true; return;
  }
  /* ── タイムラプス動画専用ウィザード ── */
  if(item.type==='action' && item.id==='m6_2'){
    addLog('enter','⏱ TL',ilabel(item));
    showTimelapsWizard(); inDialog=true; return;
  }
  if(item.type==='action'){addLog('enter','ACT',ilabel(item));showInfo(item,L('action_note'));return;}
  if(item.options){
    const arr=item.options[lang]||item.options.ja;
    dOptIdx=arr.indexOf(ivalue(item)); if(dOptIdx<0)dOptIdx=0;
    showSelect(item); inDialog=true; addLog('enter','OPEN',ilabel(item));
  }
}

/* ──────────────────────────────────────────────────────────────────
   排他制御 (実機マニュアル UG-03_Shooting-2_0040.html 準拠)

   メイン記録形式 (m1_3) の現在値によって、選択可能な解像度と圧縮方式が決まる。
   実装方針:
     - 選択不可セルはグリッドに表示するが「無効」状態にして灰色化
     - キー操作でカーソル移動は可能だが、Enter/SET は拒否
     - メイン記録形式が変更されると、現在の選択が無効化された場合に自動補正
   ────────────────────────────────────────────────────────────────── */

/* m1_3 の現在値 (日本語側) を取得。"XF-AVC S YCC420 8bit/XF-AVC S YCC420 8bit" → "XF-AVC S YCC420 8bit" */
function getMainRecFormat() {
  /* 動画モードのページ1を直接探索。ランタイムは DEF (SAMPLE のディープコピー) を使う */
  try {
    const tabs = DEF?.movie?.tabs || [];
    for (const tab of tabs) {
      for (const page of (tab.pages || [])) {
        for (const it of (page.items || [])) {
          if (it.id === 'm1_3') {
            return (it.value || '').split('/')[0] || 'XF-AVC S YCC420 8bit';
          }
        }
      }
    }
  } catch (e) {}
  return 'XF-AVC S YCC420 8bit';
}

/* メイン記録形式が RAW 系か (= 解像度は raw/sraw のみ) */
function isMainRecRaw() { return getMainRecFormat() === 'RAW'; }

/* メイン記録形式が XF-HEVC S 系か (= 8K-D/8K-U が選択可能) */
function isMainRecHevcS() {
  const f = getMainRecFormat();
  return f === 'XF-HEVC S YCC422 10bit' || f === 'XF-HEVC S YCC420 10bit';
}

/* メイン記録形式が XF-AVC S YCC422 10bit か (= 高画質/標準/軽量イントラ系が無条件で選択可能) */
function isMainRecAvc422_10() { return getMainRecFormat() === 'XF-AVC S YCC422 10bit'; }

/* 解像度 id がメイン記録形式と組み合わせて有効か */
function isResEnabled(resId) {
  const isRaw = (resId === 'raw' || resId === 'sraw');
  if (isMainRecRaw()) return isRaw;             /* RAWモード時は raw/sraw のみ */
  if (isRaw) return false;                       /* RAW以外モード時は raw/sraw 不可 */
  if (resId === '8kd' || resId === '8ku') return isMainRecHevcS();  /* 8K は HEVC S のみ */
  return true;                                   /* 他の解像度は基本OK */
}

/* 圧縮方式 (MR_COMP の要素) がメイン記録形式と現在の解像度の組み合わせで有効か */
function isCompEnabled(comp, resId) {
  const iconId = comp.iconId;
  /* RAW系圧縮方式は解像度が raw/sraw のときだけ */
  if (iconId === 'raw_std' || iconId === 'raw_lite') return (resId === 'raw' || resId === 'sraw');
  /* RAW以外の圧縮方式は raw/sraw のときは出ない */
  if (resId === 'raw' || resId === 'sraw') return false;

  const is8K = (resId === '8kd' || resId === '8ku');

  /* 高画質イントラ: メイン記録形式 = XF-AVC S YCC422 10bit のときのみ */
  if (iconId === 'hi_intra') return isMainRecAvc422_10();
  /* 標準/軽量イントラ: 解像度が 8K-D/8K-U または メイン記録形式 = XF-AVC S YCC422 10bit */
  if (iconId === 'std_intra' || iconId === 'lt_intra') {
    return is8K || isMainRecAvc422_10();
  }
  /* Long GOP は基本どこでも OK */
  return true;
}

/* メイン記録形式変更時の補正:
     現在の解像度や圧縮方式が無効になった場合に、最初の有効値へ自動切替 */
function reconcileAfterMainRecChange() {
  /* (1) 解像度が無効なら、有効な先頭の解像度に切り替え */
  if (!isResEnabled(mrRes().id)) {
    const firstValid = MR_RES.findIndex(r => isResEnabled(r.id));
    if (firstValid >= 0) {
      MRW.resIdx = firstValid;
      /* グリッド位置も同期 */
      const targetId = MR_RES[firstValid].id;
      for (let row=0; row<MR_RES_GRID.length; row++) {
        const col = MR_RES_GRID[row].indexOf(targetId);
        if (col >= 0) { MRW.gridRow=row; MRW.gridCol=col; break; }
      }
    }
  }
  /* (2) 圧縮方式インデックスが範囲外なら最初の有効値へ */
  const comps = mrComps();
  const curResId = mrRes().id;
  const cur = comps[MRW.compIdx];
  if (!cur || !isCompEnabled(cur, curResId)) {
    const firstValid = comps.findIndex(c => isCompEnabled(c, curResId));
    MRW.compIdx = firstValid >= 0 ? firstValid : 0;
  }
  /* (3) fps インデックスも範囲外ならクランプ (mrCurrentFps が Math.min してくれるので最低限ここで0に戻す程度) */
  const fpsList = mrFpsAll();
  if (MRW.fpsIdx >= fpsList.length) MRW.fpsIdx = 0;
}

/* ── SVGアイコン：解像度（大・ウィザード用）
       実機準拠のフィルム枠デザイン:
         - 上辺＋右上の縦線（開いた枠）
         - 左側にフィルム穴（パーフォレーション）3つ
         - 中央テキスト：通常版は1段（解像度名のみ）、Fine版は2段（解像度名 + Fine）
       色は currentColor を使わずパラメータ c で受け取る ── */
function mrIconRes(id, c) {
  const cfg = {
    raw:    {label:'RAW',  fine:false},

    '8kd':  {label:'8K-D', fine:false},

    '2kd_f':{label:'2K-D', fine:true },
    '2kd':  {label:'2K-D', fine:false},
    'fhd_f':{label:'FHD',  fine:true },
    'fhd':  {label:'FHD',  fine:false},
  }[id]||{label:'?',fine:false};
  /* テキストサイズ：4文字のSRAWは少し小さく */
  const fs1 = cfg.fine
    ? (cfg.label==='SRAW' ? 9  : cfg.label==='FHD' ? 9.5 : 10)
    : (cfg.label==='SRAW' ? 11 : cfg.label==='FHD' ? 12  : 13);
  const fs2 = 6.5;
  const frame = `
    <path d="M2 3 L54 3 L54 9" stroke="${c}" stroke-width="1.5" fill="none" stroke-linecap="square"/>
    <rect x="3" y="5"  width="2.4" height="3" fill="${c}"/>
    <rect x="3" y="11" width="2.4" height="3" fill="${c}"/>
    <rect x="3" y="17" width="2.4" height="3" fill="${c}"/>`;
  const text = cfg.fine
    ? `<text x="32" y="14" text-anchor="middle" font-size="${fs1}" font-weight="700" font-family="Arial,sans-serif" fill="${c}">${cfg.label}</text>
       <text x="32" y="24" text-anchor="middle" font-size="${fs2}" font-weight="600" font-family="Arial,sans-serif" fill="${c}">Fine</text>`
    : `<text x="32" y="22" text-anchor="middle" font-size="${fs1}" font-weight="700" font-family="Arial,sans-serif" fill="${c}">${cfg.label}</text>`;
  return `<svg viewBox="0 0 56 32" width="56" height="32" xmlns="http://www.w3.org/2000/svg">${frame}${text}</svg>`;
}

/* ── SVGアイコン：fps（大・ウィザード用）
       実機準拠の白地黒文字ピル型ラベル:
         - 角丸矩形 (rx=3, viewBox 56×22) を白で塗り

       色引数 c は使用しない (常に白地黒文字。状態表現は呼び出し側の枠線で行う) ── */

/* ── SVGアイコン：圧縮方式（大・ウィザード用）
       実機準拠デザイン:
         - ベース: 白地黒文字の角丸矩形ラベル (Intra / LGOP / RAW)
         - 標準版: ラベル単独・中央配置
         - 高画質(↑)版: ラベル左寄せ + 右に「白塗り箱 + 上向き矢印が突き出る」
         - 軽量(↓)版: ラベル左寄せ + 右に「破線輪郭(大) + ↓矢印 + 内側下部に実線塗り箱(小)」
       7種iconId: hi_intra / std_intra / lt_intra / std_lgop / lt_lgop / raw_std / raw_lite
       色引数 c は使用しない (常に白基調。状態表現は呼び出し側の枠線で行う) ── */
function mrIconComp(iconId, c) {
  /* iconId → ラベル文字 + 修飾種別 (none/up/down) のマッピング */
  const cfg = {
    hi_intra:  { label:'Intra', mod:'up'   },
    std_intra: { label:'Intra', mod:'none' },
    lt_intra:  { label:'Intra', mod:'down' },
    std_lgop:  { label:'LGOP',  mod:'none' },
    lt_lgop:   { label:'LGOP',  mod:'down' },
    raw_std:   { label:'RAW',   mod:'none' },
    raw_lite:  { label:'RAW',   mod:'down' },
  }[iconId] || { label:'?', mod:'none' };

  /* ラベル矩形の位置: 修飾なしは中央、修飾ありは左寄せ */
  const labelX = cfg.mod==='none' ? 11 : 0;
  const textX  = labelX + 17;

  const labelRect = `<rect x="${labelX}" y="2" width="34" height="18" rx="1" fill="#fff"/>
    <text x="${textX}" y="15.5" text-anchor="middle" font-size="10" font-weight="700" font-family="Arial,sans-serif" fill="#000">${cfg.label}</text>`;

  let modifier = '';
  if (cfg.mod === 'up') {
    /* 高画質: 白塗り箱(下) + 上向き矢印が箱から突き出る */
    modifier = `
      <rect x="38" y="13" width="16" height="7" fill="#fff"/>
      <path d="M46 12 L46 4 M42 8 L46 4 L50 8" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
  } else if (cfg.mod === 'down') {
    /* 軽量: 破線輪郭(大) + ↓矢印 + 内側下部に実線塗り箱(小) */
    modifier = `
      <rect x="38" y="3" width="16" height="17" stroke="#fff" stroke-width="1" stroke-dasharray="1.5 1.2" fill="none"/>
      <path d="M46 5 L46 12 M43 9.5 L46 12.5 L49 9.5" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="41" y="14.5" width="10" height="5" fill="#fff"/>`;
  }

  return `<svg viewBox="0 0 56 22" width="56" height="22" xmlns="http://www.w3.org/2000/svg">${labelRect}${modifier}</svg>`;
}

  /* 各タブのSVGアイコン (現在選択されている値) */
  const tabIconHTML = [
    /* 解像度: viewBox 56×32 → 高さ 24px に縮小 */
    mrIconRes(r.id,'#fff').replace('width="56" height="32"','width="42" height="24"'),
    /* fps: viewBox 56×22 → 高さ 22px */
    mrIconFps(fps,'#fff').replace('width="56" height="22"','width="50" height="22"'),
    /* 圧縮方式: viewBox 56×22 → 高さ 22px (compが無い場合は空) */
    comp ? mrIconComp(comp.iconId,'#fff').replace('width="56" height="22"','width="50" height="22"') : '',
  ];
  tabIconHTML.forEach((iconHtml,i)=>{
    const act=i===MRW.tab;
    const t=document.createElement('div');
    t.style.cssText=`display:flex;align-items:center;justify-content:center;padding:0 2px;
      cursor:pointer;
      border-bottom:${act?'2px solid '+C_AC:'2px solid transparent'};
      opacity:${act?1:0.55};
      transition:opacity .15s;`;
    t.innerHTML=iconHtml;
    t.addEventListener('click',()=>{ MRW.tab=i; MRW.gridRow=0; MRW.gridCol=0; mrRenderAll(); });
    tabRow.appendChild(t);
  });
  ov.appendChild(tabRow);

  /* ━━━ ④ コンテンツエリア ━━━ */
  const content=document.createElement('div');
  content.style.cssText='flex:1;overflow:hidden;display:flex;flex-direction:column;';
  if(MRW.tab===0)      mrRenderResGrid(content);
  else if(MRW.tab===1) mrRenderFpsGrid(content);
  else                 mrRenderCompList(content);
  ov.appendChild(content);

  /* ━━━ ⑤ ステータスバー ━━━ */
  const stat=document.createElement('div');
  stat.style.cssText=`display:flex;align-items:center;justify-content:space-between;`
    +'padding:3px 8px 3px 0;margin-left:-8px;padding-left:8px;background:#030608;border-top:1px solid #0f1e2a;flex-shrink:0;';
  const hint=document.createElement('span');
  hint.style.cssText='font-size:9px;color:#2a4060;font-family:var(--font-mono);';
  hint.textContent=lang==='ja'?'↑↓←→:選択  SET:確定  MENU:閉じる':'↑↓←→:Select  SET:OK  MENU:Close';
  const selEl=document.createElement('span');
  selEl.style.cssText='font-size:9px;color:#e05040;font-family:var(--font-mono);';
  if(MRW.tab===0)      selEl.textContent=(lang==='ja'?r.ja:r.en)+' '+r.sub.split('  ')[1];
  else if(MRW.tab===1) selEl.textContent=fps+' fps';
  else if(comp)        selEl.textContent=mrCompLabel(comp);
  stat.appendChild(hint); stat.appendChild(selEl);
  ov.appendChild(stat);
}

/* ── 共通グリッドセル高さ定数 ── */
const MR_CELL_H = 52; /* px：3タブ共通のセル固定高さ */
const MR_ROW_STYLE = `display:grid;grid-template-columns:repeat(6,1fr);grid-auto-rows:${MR_CELL_H}px;gap:5px;flex-shrink:0;`;
const MR_CELL_BASE = `height:${MR_CELL_H}px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:2px;min-width:0;overflow:hidden;`;

/* ── 解像度グリッド（2行×6列） ── */
function mrRenderResGrid(container) {
  const inner=document.createElement('div');
  inner.style.cssText='padding:6px 8px 6px 0;display:flex;flex-direction:column;gap:5px;overflow:hidden;justify-content:flex-start;flex:1;';

  MR_RES_GRID.forEach((row,ri)=>{
    const rowEl=document.createElement('div');
    rowEl.style.cssText=MR_ROW_STYLE;
    row.forEach((resId,ci)=>{
      const r=MR_RES.find(x=>x.id===resId);
      const isSelected=MRW.resIdx===MR_RES.indexOf(r);
      const isCursor=MRW.gridRow===ri&&MRW.gridCol===ci;
      const isEnabled=isResEnabled(resId);
      /* アイコン色は fps/comp と同じく2階調 (カーソル時=薄オレンジ、その他=白) に統一。
         「現在の選択」は枠線+背景で表現し、アイコン色では区別しない。
         無効セルはグリッドに表示するが opacity を下げて灰色化、Enter/SET は拒否 */
      const c=isCursor?'#f0a090':'#fff';
      const cell=document.createElement('div');
      cell.style.cssText=MR_CELL_BASE
        +`gap:2px;padding:4px 2px;`
        +`border:${isCursor?'2px solid #e05040':isSelected?'1px solid #4a6880':'1px solid #1a2a38'};`
        +`background:${isCursor?'#0e1e2e':isSelected?'#070e18':'transparent'};`
        +`opacity:${isEnabled?1:0.28};`
        +`cursor:${isEnabled?'pointer':'not-allowed'};`;
      const iw=document.createElement('div');
      iw.style.cssText='display:flex;align-items:center;justify-content:center;width:100%;';
      /* ウィザード用は大サイズアイコン (mrIconRes / viewBox 56×32) を使用。
         セル幅にフィットするよう SVG の width を調整 */
      iw.innerHTML=mrIconRes(resId,c).replace('width="56" height="32"','width="100%" height="32" preserveAspectRatio="xMidYMid meet"');
      const sub=document.createElement('div');
      /* 縦横比サブテキストもアイコンに合わせて白系に */
      sub.style.cssText=`font-size:7px;color:${isCursor?'#c0d0e0':'#7a8898'};font-family:var(--font-mono);white-space:nowrap;`;
      sub.textContent=r?r.sub.split('  ')[1]:'';
      cell.appendChild(iw); cell.appendChild(sub);
      cell.addEventListener('click',()=>{
        /* 無効セルはカーソル移動のみ許可 (確定はしない) */
        MRW.gridRow=ri; MRW.gridCol=ci;
        if (isEnabled) {
          MRW.resIdx=MR_RES.indexOf(r);
          MRW.fpsIdx=0; MRW.compIdx=0;
        }
        mrRenderAll();
      });
      rowEl.appendChild(cell);
    });
    inner.appendChild(rowEl);
  });
  container.appendChild(inner);
}

/* ── fpsグリッド（最大2行×6列） ── */
function mrRenderFpsGrid(container) {
  const inner=document.createElement('div');
  inner.style.cssText='padding:6px 8px 6px 0;display:flex;flex-direction:column;gap:5px;overflow:hidden;justify-content:flex-start;flex:1;';
  const allFps=mrFpsAll();
  const COLS=6;
  const rows=[];
  for(let i=0;i<allFps.length;i+=COLS) rows.push(allFps.slice(i,i+COLS));

  rows.forEach((rowFps)=>{
    const rowEl=document.createElement('div');
    rowEl.style.cssText=MR_ROW_STYLE;
    rowFps.forEach(f=>{
      const fi=allFps.indexOf(f);
      const isSel=MRW.fpsIdx===fi;
      const c=isSel?'#f0a090':'#3a5060';
      const btn=document.createElement('div');
      btn.style.cssText=MR_CELL_BASE
        +`padding:4px 2px;`
        +`border:${isSel?'2px solid #e05040':'1px solid #1a2a38'};`
        +`background:${isSel?'#0e1e2e':'transparent'};`;
      const iw=document.createElement('div');
      iw.style.cssText='display:flex;align-items:center;justify-content:center;width:100%;';
      /* ウィザード用は大サイズアイコン (mrIconFps / viewBox 56×22) を使用。
         セル幅にフィットするよう SVG の width を調整 */
      iw.innerHTML=mrIconFps(f,c).replace('width="56" height="22"','width="100%" height="22" preserveAspectRatio="xMidYMid meet"');
      btn.appendChild(iw);
      btn.addEventListener('click',()=>{ MRW.fpsIdx=fi; mrRenderAll(); });
      rowEl.appendChild(btn);
    });
    for(let k=rowFps.length;k<COLS;k++){
      rowEl.appendChild(document.createElement('div'));
    }
    inner.appendChild(rowEl);
  });

}

/* ── 圧縮方式グリッド（最大2行×6列、アイコン+ラベル） ── */
function mrRenderCompList(container) {
  const inner=document.createElement('div');
  inner.style.cssText='padding:6px 8px 6px 0;display:flex;flex-direction:column;gap:5px;overflow:hidden;justify-content:flex-start;flex:1;';
  const comps=mrComps();
  const COLS=6;
  const rows=[];
  for(let i=0;i<comps.length;i+=COLS) rows.push(comps.slice(i,i+COLS));

  rows.forEach((rowComps,ri)=>{
    const rowEl=document.createElement('div');
    rowEl.style.cssText=MR_ROW_STYLE;
    rowComps.forEach((comp,ci)=>{
      const gi=ri*COLS+ci;
      const isSel=MRW.compIdx===gi;
      const isEnabled=isCompEnabled(comp, mrRes().id);
      const c=isSel?'#f0a090':'#fff';
      const cell=document.createElement('div');
      cell.style.cssText=MR_CELL_BASE
        +`gap:3px;padding:4px 2px;`
        +`border:${isSel?'2px solid #e05040':'1px solid #1a2a38'};`
        +`background:${isSel?'#0e1e2e':'transparent'};`
        +`opacity:${isEnabled?1:0.28};`
        +`cursor:${isEnabled?'pointer':'not-allowed'};`;
      const iw=document.createElement('div');
      iw.style.cssText='display:flex;align-items:center;justify-content:center;width:100%;';
      /* ウィザード用は大サイズアイコン (mrIconComp / viewBox 56×22) を使用 */
      iw.innerHTML=mrIconComp(comp.iconId,c).replace('width="56" height="22"','width="100%" height="22" preserveAspectRatio="xMidYMid meet"');
      cell.appendChild(iw);
      cell.addEventListener('click',()=>{
        /* 無効セルはカーソル移動のみ (確定はしない) */
        if (isEnabled) MRW.compIdx=gi;
        mrRenderAll();
      });
      rowEl.appendChild(cell);
    });
    for(let k=rowComps.length;k<COLS;k++){
      rowEl.appendChild(document.createElement('div'));
    }
    inner.appendChild(rowEl);
  });
  container.appendChild(inner);
}

/* ── キー操作 ── */
function mrNavUp() {
  if(MRW.tab===0){
    MRW.gridRow=Math.max(0,MRW.gridRow-1); mrApplyGridRes();
  } else if(MRW.tab===1){
    const a=mrFpsAll(); MRW.fpsIdx=(MRW.fpsIdx-1+a.length)%a.length;
  } else {
    const l=mrComps().length; MRW.compIdx=(MRW.compIdx-1+l)%l;
  }
  mrRenderAll();
}
function mrNavDown() {
  if(MRW.tab===0){
    MRW.gridRow=Math.min(MR_RES_GRID.length-1,MRW.gridRow+1); mrApplyGridRes();
  } else if(MRW.tab===1){
    const a=mrFpsAll(); MRW.fpsIdx=(MRW.fpsIdx+1)%a.length;
  } else {
    const l=mrComps().length; MRW.compIdx=(MRW.compIdx+1)%l;
  }
  mrRenderAll();
}
function mrNavLeft() {
  if(MRW.tab===0){
    if(MRW.gridCol>0){ MRW.gridCol--; mrApplyGridRes(); mrRenderAll(); }
    else { MRW.tab=(MRW.tab-1+3)%3; MRW.gridRow=0; MRW.gridCol=0; mrRenderAll(); }
  } else { MRW.tab=(MRW.tab-1+3)%3; MRW.gridRow=0; MRW.gridCol=0; mrRenderAll(); }
}
function mrNavRight() {
  if(MRW.tab===0){
    const cols=MR_RES_GRID[MRW.gridRow]?.length||1;
    if(MRW.gridCol<cols-1){ MRW.gridCol++; mrApplyGridRes(); mrRenderAll(); }
    else { MRW.tab=(MRW.tab+1)%3; MRW.gridRow=0; MRW.gridCol=0; mrRenderAll(); }
  } else { MRW.tab=(MRW.tab+1)%3; MRW.gridRow=0; MRW.gridCol=0; mrRenderAll(); }
}
function mrApplyGridRes() {
  const resId=MR_RES_GRID[MRW.gridRow]?.[MRW.gridCol]; if(!resId) return;
  /* 無効セルではカーソル位置だけ更新し、解像度の確定はしない */
  if (!isResEnabled(resId)) return;
  const idx=MR_RES.findIndex(r=>r.id===resId);
  if(idx>=0){ MRW.resIdx=idx; MRW.fpsIdx=0; MRW.compIdx=0; }
}
function mrEnter() { mrConfirm(); }
function mrBack()  { closeDialog(); }

function mrConfirm() {
  /* Enter/SET 押下時の拒否判定:
       タブ0 (解像度): カーソル位置のセルが無効なら拒否
       タブ2 (圧縮方式): カーソル位置の comp が無効なら拒否
       (タブ1 fps は排他制御の対象外なので常に許可) */
  if (MRW.tab === 0) {
    const resId = MR_RES_GRID[MRW.gridRow]?.[MRW.gridCol];
    if (resId && !isResEnabled(resId)) {
      addLog('warn','✗ DENY','選択不可 (メイン記録形式と非互換)');
      return;
    }
  } else if (MRW.tab === 2) {
    const comp = mrComps()[MRW.compIdx];
    if (comp && !isCompEnabled(comp, mrRes().id)) {
      addLog('warn','✗ DENY','選択不可 (メイン記録形式と非互換)');
      return;
    }
  }
  const r=mrRes(), fps=mrCurrentFps(), comp=mrCurrentComp();
  const srcItem=currentItem();
  const resLabel=lang==='ja'?r.ja:r.en;
  const compLabel=comp?mrCompLabel(comp):'—';
  const summary=`${resLabel}  ${fps}fps  ${compLabel}`;
  if(srcItem){
    srcItem.value=summary;
    srcItem.mrData={ resId:r.id, fps, compIconId:comp?comp.iconId:'std_intra' };
  }
  addLog('set','✓ REC',summary);
  addLog('set','  Mbps',comp?comp.mbps:'—');
  closeDialog(); render();
}

/* ╔══════════════════════════════════════════════════════════════╗
   ║  SECTION 7: WIZARD — TIMELAPSE                                ║
   ║  タイムラプス動画設定ウィザード (TLW / tlXxx)                               ║
   ╚══════════════════════════════════════════════════════════════╝ */
/* ── タイムラプス動画ウィザード / EOS R5 Mark II: Time-lapse movie / 設定項目: / 1. Time-lapse        : Disable / Enable / 2. Interval          : 00:00:02 〜 99:59:59 / 3. No. of shots      : 0002 〜 3600 / 4. Movie rec. size   : 解像度+fps+圧縮（タイムラプス専用） / 5. Main rec. format  : XF-HEVC S / XF-AVC S 422 / XF-AVC S 420 / 6. Auto exposure     : Fixed 1st frame / Each frame / 7. Screen auto off   : Disable / Enable / 8. Beep per shot     : 0 〜 5 ── */
const TLW = {
  enabled:    true,           /* Time-lapse ON/OFF */
  intH: 0, intM: 0, intS: 2, /* Interval 00:00:02 */
  shots:      300,            /* No. of shots */
  recSizeIdx: 0,              /* Movie rec. size インデックス */
  formatIdx:  0,              /* Main rec. format インデックス */
  aeIdx:      0,              /* Auto exposure */
  screenOff:  false,          /* Screen auto off */
  beep:       1,              /* Beep per shot 0〜5 */
  /* 編集フォーカス: メインリストの行インデックス */
  rowIdx: 0,
  /* サブ編集モード: null | 'interval' | 'shots' | 'recsize' | 'select' */
  editMode: null,
  editSelectIdx: 0,
  /* interval 編集中のフィールド（0=H, 1=M, 2=S） */
  intField: 0,
  /* shots 編集中の桁フィールド（0=千, 1=百, 2=十, 3=一） */
  shotsField: 0,
};

/* タイムラプス専用 Movie rec. size 選択肢 */
const TL_RECSIZES = [
  { resId:'8ku', fps:'29.97', compIconId:'std_intra', ja:'8K-U  29.97fps  標準イントラ',     en:'8K-U  29.97fps  Std Intra'   },
  { resId:'8ku', fps:'29.97', compIconId:'lt_intra',  ja:'8K-U  29.97fps  軽量イントラ',     en:'8K-U  29.97fps  Light Intra' },
  { resId:'4ku', fps:'29.97', compIconId:'hi_intra',  ja:'4K-U  29.97fps  高画質イントラ',   en:'4K-U  29.97fps  High Intra'  },
  { resId:'4ku', fps:'29.97', compIconId:'std_intra', ja:'4K-U  29.97fps  標準イントラ',     en:'4K-U  29.97fps  Std Intra'   },
  { resId:'4ku', fps:'29.97', compIconId:'lt_intra',  ja:'4K-U  29.97fps  軽量イントラ',     en:'4K-U  29.97fps  Light Intra' },
  { resId:'fhd', fps:'29.97', compIconId:'std_intra', ja:'Full HD  29.97fps  標準イントラ',  en:'Full HD  29.97fps  Std Intra'},
];
function tlRecSizeLabel(idx, l){ const r=TL_RECSIZES[idx]; if(!r) return ''; return l==='en'?r.en:r.ja; }

const TL_FORMATS = {
  ja:['XF-HEVC S YCC422 10bit','XF-AVC S YCC422 10bit','XF-AVC S YCC420 8bit'],
  en:['XF-HEVC S YCC422 10bit','XF-AVC S YCC422 10bit','XF-AVC S YCC420 8bit'],
};
const TL_AE = {
  ja:['1枚目の露出で固定','各コマで自動調整'],
  en:['Fixed 1st frame','Each frame'],
};

/* ── 計算ヘルパー ── */
function tlIntervalSec() { return TLW.intH*3600 + TLW.intM*60 + TLW.intS; }
function tlRequiredSec() { return tlIntervalSec() * TLW.shots; }
function tlPlaybackSec() { return TLW.shots / 29.97; } /* NTSC 29.97fps固定 */
function tlFmtTime(sec) {
  const d=Math.floor(sec/86400), h=Math.floor((sec%86400)/3600);
  const m=Math.floor((sec%3600)/60), s=Math.floor(sec%60);
  if(d>=2) return `${d} days`;
  if(d===1) return `${h+24}h ${String(m).padStart(2,'0')}m`;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function tlFmtPlayback(sec) {
  const m=Math.floor(sec/60), s=Math.floor(sec%60);
  return `${String(m).padStart(2,'0')}'${String(s).padStart(2,'0')}"`;
}

/* ── メイン行定義 ── */
function tlRows() {
  const l = lang;
  const intStr = `${String(TLW.intH).padStart(2,'0')}:${String(TLW.intM).padStart(2,'0')}:${String(TLW.intS).padStart(2,'0')}`;
  const enabled = TLW.enabled;
  return [
    { key:'enabled',  ja:'タイムラプス撮影',  en:'Time-lapse',
      val: TLW.enabled ? (l==='ja'?'する':'Enable') : (l==='ja'?'しない':'Disable'), edit:'select' },
    { key:'interval', ja:'撮影間隔',           en:'Interval',
      val: intStr, edit: enabled?'interval':null, dim:!enabled },
    { key:'shots',    ja:'撮影枚数',           en:'No. of shots',
      val: String(TLW.shots).padStart(4,'0'), edit: enabled?'shots':null, dim:!enabled },
    { key:'recsize',  ja:'動画記録サイズ',     en:'Movie rec. size',
      val: tlRecSizeLabel(TLW.recSizeIdx,l), mrData: TL_RECSIZES[TLW.recSizeIdx], edit: enabled?'recsize':null, dim:!enabled },
    { key:'format',   ja:'メイン記録形式',     en:'Main rec. format',
      val: (TL_FORMATS[l]||TL_FORMATS.ja)[TLW.formatIdx], edit: enabled?'select':null, dim:!enabled },
    { key:'ae',       ja:'自動露出',           en:'Auto exposure',
      val: (TL_AE[l]||TL_AE.ja)[TLW.aeIdx], edit: enabled?'select':null, dim:!enabled },
    { key:'screenoff',ja:'モニター自動消灯',   en:'Screen auto off',
      val: TLW.screenOff?(l==='ja'?'する':'Enable'):(l==='ja'?'しない':'Disable'), edit: enabled?'select':null, dim:!enabled },
    { key:'beep',     ja:'撮影時の電子音',     en:'Beep per shot',
      val: String(TLW.beep), edit: enabled?'beep':null, dim:!enabled },
  ];
}

/* ── ウィザードを開く ── */
function showTimelapsWizard() {
  removeDialog();
  /* メニュー側 srcItem.value から TLW.enabled を復元（する/しない の同期） */
  const src=currentItem();
  if(src && typeof src.value==='string'){
    const ja = src.value.split('/')[0];
    if(ja==='する')      TLW.enabled = true;
    else if(ja==='しない') TLW.enabled = false;
  }
  const ov = document.createElement('div');
  ov.id='tlWiz';
  ov.style.cssText='position:absolute;inset:0;background:#040810;z-index:200;display:flex;flex-direction:column;overflow:hidden;';
  ov.innerHTML=`
    <div style="flex-shrink:0;background:#030608;border-bottom:1px solid #0a1520;display:flex;align-items:center;justify-content:space-between;padding:4px 9px;">
      <span id="tlTitle" style="font-size:12px;font-weight:bold;color:#fff;letter-spacing:.06em;font-family:var(--font-mono);border-bottom:2px solid var(--tc,#d07020);padding-bottom:2px;">タイムラプス動画</span>
      <span style="font-size:9px;color:#888;font-family:var(--font-mono)" id="tlSummary"></span>
    </div>
    <div id="tlMainArea" style="flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;"></div>
    <div style="flex-shrink:0;background:#030608;border-top:1px solid #0a1520;display:flex;align-items:center;justify-content:space-between;padding:3px 9px;">
      <span id="tlHint" style="font-size:11px;color:#888;font-family:var(--font-mono)">↑↓:選択  SET:編集  MENU:閉じる</span>
      <span id="tlCalc" style="font-size:11px;color:#fff;font-family:var(--font-mono)"></span>
    </div>`;
  $('lcd').appendChild(ov);
  tlRender();
}

/* ── メインリストを描画 ── */
function tlRender() {
  const area = document.getElementById('tlMainArea'); if(!area) return;
  area.innerHTML='';

  /* 撮影所要時間・再生時間の計算 */
  const reqSec = tlRequiredSec(), pbSec = tlPlaybackSec();
  const calcEl = document.getElementById('tlCalc');
  if(calcEl && TLW.enabled) {
    calcEl.textContent = `⏱ ${tlFmtTime(reqSec)}  ▶ ${tlFmtPlayback(pbSec)}`;
    calcEl.style.color = (pbSec < 1) ? '#c05030' : '#fff';
  } else if(calcEl) { calcEl.textContent=''; }

  const titleEl = document.getElementById('tlTitle');
  if(titleEl) {
    if(TLW.editMode) {
      /* 編集中はカーソル行のラベルをタイトルに表示（階層を明示） */
      const r = tlRows()[TLW.rowIdx];
      titleEl.textContent = r ? (lang==='ja'?r.ja:r.en) : (lang==='ja'?'タイムラプス動画':'Time-lapse movie');
    } else {
      titleEl.textContent = lang==='ja'?'タイムラプス動画':'Time-lapse movie';
    }
  }

  /* サブ編集モードが開いていれば専用UI */
  const mode = TLW.editMode;
  if(mode==='interval') { tlRenderIntervalEdit(area); return; }
  if(mode==='shots')    { tlRenderShotsEdit(area); return; }
  if(mode==='recsize')  { tlRenderRecsizeEdit(area); return; }
  if(mode==='select')   { tlRenderSelectEdit(area); return; }
  if(mode==='beep')     { tlRenderBeepEdit(area); return; }

  /* メインリスト */
  const rows = tlRows();
  const ROW_H=32, areaH=346-28-26;
  const maxV=Math.floor(areaH/ROW_H);
  const ri=TLW.rowIdx;
  const start=Math.max(0,Math.min(ri-Math.floor(maxV/2),rows.length-maxV));
  rows.slice(start,start+maxV).forEach((row,si)=>{
    const realIdx=start+si, sel=realIdx===TLW.rowIdx;
    const dim=row.dim;
    const el=document.createElement('div');
    el.style.cssText=`display:flex;align-items:center;height:${ROW_H}px;padding:0 9px;
      border-top:1px solid ${sel?'var(--tc,#d07020)':'transparent'};
      border-bottom:1px solid ${sel?'var(--tc,#d07020)':'transparent'};
      border-left:10px solid ${sel?'var(--tc,#d07020)':'transparent'};
      border-right:10px solid ${sel?'var(--tc,#d07020)':'transparent'};
      background:${sel?'rgba(255,255,255,.06)':'transparent'};
      cursor:${dim?'default':'pointer'};flex-shrink:0;box-sizing:border-box;`;
    /* ラベル span */
    const labelHtml = `<span style="flex:0 0 50%;font-size:13px;font-family:var(--font-mono);color:${dim?'#444':'#fff'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">`+
      esc(lang==='ja'?row.ja:row.en)+
      `</span>`;
    if(row.key==='recsize' && row.mrData){
      /* recsize 行は値部分をアイコン3連で表示（メイン側 m1_1 と同じ構造） */
      const iconColor=dim?'#555':'#fff';
      el.innerHTML = labelHtml;
      const valWrap=document.createElement('div');
      valWrap.style.cssText='flex:0 0 50%;display:flex;align-items:center;gap:6px;overflow:hidden;';
      const r=document.createElement('div'); r.innerHTML=mrIconResSmall(row.mrData.resId, iconColor); valWrap.appendChild(r);
      const f=document.createElement('div'); f.innerHTML=mrIconFpsSmall(row.mrData.fps, iconColor); valWrap.appendChild(f);
      const c=document.createElement('div'); c.innerHTML=mrIconCompSmall(row.mrData.compIconId, iconColor); valWrap.appendChild(c);
      el.appendChild(valWrap);
    } else {
      el.innerHTML = labelHtml +
        `<span style="flex:0 0 50%;font-size:13px;font-family:var(--font-mono);color:${dim?'#333':sel?'var(--tc,#d07020)':'#fff'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;">`+
          esc(row.val)+
        `</span>`;
    }
    if(!dim){
      el.addEventListener('click',()=>{ TLW.rowIdx=realIdx; tlRender(); });
      el.addEventListener('dblclick',()=>{ TLW.rowIdx=realIdx; tlStartEdit(); });
    }
    area.appendChild(el);
  });

  /* ヒント更新 */
  const hintEl=document.getElementById('tlHint');
  if(hintEl) hintEl.textContent = lang==='ja'
    ?'↑↓:選択  SET:編集  MENU:閉じる'
    :'↑↓:Select  SET:Edit  MENU:Close';

  /* サマリー */
  const sumEl=document.getElementById('tlSummary');
  if(sumEl) sumEl.textContent = TLW.enabled
    ? `${String(TLW.shots).padStart(4,'0')} shots`
    : (lang==='ja'?'無効':'Disabled');
}

/* ── 編集開始 ── */
function tlStartEdit() {
  const row=tlRows()[TLW.rowIdx];
  if(!row||!row.edit) return;
  TLW.editMode=row.edit;
  TLW.intField=0;
  TLW.shotsField=0;
  /* selectの初期位置 */
  if(row.edit==='select'||row.edit==='recsize') {
    if(row.key==='enabled')    TLW.editSelectIdx=TLW.enabled?1:0;
    else if(row.key==='format')    TLW.editSelectIdx=TLW.formatIdx;
    else if(row.key==='ae')        TLW.editSelectIdx=TLW.aeIdx;
    else if(row.key==='screenoff') TLW.editSelectIdx=TLW.screenOff?1:0;
    else if(row.key==='recsize')   TLW.editSelectIdx=TLW.recSizeIdx;
  }
  tlRender();
}

/* ── SELECT系確定 ── */
function tlConfirmSelect() {
  const row=tlRows()[TLW.rowIdx];
  const i=TLW.editSelectIdx;
  if(row.key==='enabled')    { TLW.enabled=i===1; addLog('set','⏱ TL',TLW.enabled?'Enable':'Disable'); }
  else if(row.key==='format')    { TLW.formatIdx=i; addLog('set','⏱ TL FORMAT',(TL_FORMATS.ja)[i]); }
  else if(row.key==='ae')        { TLW.aeIdx=i;    addLog('set','⏱ TL AE',(TL_AE.ja)[i]); }
  else if(row.key==='screenoff') { TLW.screenOff=i===1; addLog('set','⏱ TL SCREEN',TLW.screenOff?'Enable':'Disable'); }
  else if(row.key==='recsize')   { TLW.recSizeIdx=i; addLog('set','⏱ TL SIZE',tlRecSizeLabel(i,'ja')); }
  TLW.editMode=null;
  /* srcItem（タイムラプス）の value を更新 */
  tlWriteBack();
  tlRender();
}

/* ── ナビゲーション（メインリスト） ── */
function tlNavUp() {
  const mode=TLW.editMode;
  if(!mode){
    const rows=tlRows(); TLW.rowIdx=(TLW.rowIdx-1+rows.length)%rows.length; tlRender(); return;
  }
  if(mode==='interval'){
    const max=[99,59,59][TLW.intField];
    if(TLW.intField===0) TLW.intH=Math.min(99,TLW.intH+1);
    else if(TLW.intField===1) TLW.intM=(TLW.intM+1)%60;
    else TLW.intS=TLW.intS<2&&TLW.intH===0&&TLW.intM===0?2:(TLW.intS+1)%60;
    tlRender(); return;
  }
  if(mode==='shots'){
    const mul=[1000,100,10,1][TLW.shotsField];
    TLW.shots=Math.min(3600,Math.max(2,TLW.shots+mul)); tlRender(); return;
  }
  if(mode==='select'||mode==='recsize'){
    const row=tlRows()[TLW.rowIdx];
    let len;
    if(row.key==='format')    len=(TL_FORMATS.ja).length;
    else if(row.key==='ae')   len=(TL_AE.ja).length;
    else if(row.key==='recsize') len=TL_RECSIZES.length;
    else len=2;
    TLW.editSelectIdx=(TLW.editSelectIdx-1+len)%len; tlRender(); return;
  }
  if(mode==='beep'){ TLW.beep=Math.min(5,TLW.beep+1); tlRender(); return; }
}
function tlNavDown() {
  const mode=TLW.editMode;
  if(!mode){
    const rows=tlRows(); TLW.rowIdx=(TLW.rowIdx+1)%rows.length; tlRender(); return;
  }
  if(mode==='interval'){
    if(TLW.intField===0) TLW.intH=Math.max(0,TLW.intH-1);
    else if(TLW.intField===1) TLW.intM=(TLW.intM-1+60)%60;
    else { const s=TLW.intS-1; TLW.intS=(s<0)?59:Math.max(TLW.intH===0&&TLW.intM===0?2:0,s); }
    tlRender(); return;
  }
  if(mode==='shots'){
    const mul=[1000,100,10,1][TLW.shotsField];
    TLW.shots=Math.min(3600,Math.max(2,TLW.shots-mul)); tlRender(); return;
  }
  if(mode==='select'||mode==='recsize'){
    const row=tlRows()[TLW.rowIdx];
    let len;
    if(row.key==='format')    len=(TL_FORMATS.ja).length;
    else if(row.key==='ae')   len=(TL_AE.ja).length;
    else if(row.key==='recsize') len=TL_RECSIZES.length;
    else len=2;
    TLW.editSelectIdx=(TLW.editSelectIdx+1)%len; tlRender(); return;
  }
  if(mode==='beep'){ TLW.beep=Math.max(0,TLW.beep-1); tlRender(); return; }
}
function tlBack() {
  if(TLW.editMode){ TLW.editMode=null; tlRender(); addLog('back','◀ TL','編集キャンセル'); }
  else { closeDialog(); }
}
function tlEnter() {
  if(!TLW.editMode){ tlStartEdit(); return; }
  const mode=TLW.editMode;
  if(mode==='interval'){
    /* フィールドを右に進む。最後のフィールドで確定 */
    if(TLW.intField<2){ TLW.intField++; tlRender(); }
    else { addLog('set','⏱ TL INT',`${String(TLW.intH).padStart(2,'0')}:${String(TLW.intM).padStart(2,'0')}:${String(TLW.intS).padStart(2,'0')}`); TLW.editMode=null; tlWriteBack(); tlRender(); }
    return;
  }
  if(mode==='shots'){
    if(TLW.shotsField<3){ TLW.shotsField++; tlRender(); }
    else { addLog('set','⏱ TL SHOTS',String(TLW.shots)); TLW.editMode=null; tlWriteBack(); tlRender(); }
    return;
  }
  if(mode==='beep'){
    addLog('set','⏱ TL BEEP',String(TLW.beep)); TLW.editMode=null; tlWriteBack(); tlRender(); return;
  }
  /* select / recsize */
  tlConfirmSelect();
}
/* interval / shots でフィールド左移動 */
function tlNavFieldLeft() {
  if(TLW.editMode==='interval') { TLW.intField=Math.max(0,TLW.intField-1); tlRender(); }
  else if(TLW.editMode==='shots') { TLW.shotsField=Math.max(0,TLW.shotsField-1); tlRender(); }
}
function tlNavFieldRight() {
  if(TLW.editMode==='interval') { TLW.intField=Math.min(2,TLW.intField+1); tlRender(); }
  else if(TLW.editMode==='shots') { TLW.shotsField=Math.min(3,TLW.shotsField+1); tlRender(); }
}

/* ── JSONデータへ書き戻す ── */
function tlWriteBack() {
  const srcItem=currentItem(); if(!srcItem) return;
  /* メニュー行にはタイムラプス撮影の ON/OFF のみ反映（する/しない） */
  srcItem.value = TLW.enabled ? 'する/Enable' : 'しない/Disable';
  render();
}

/* ╔══════════════════════════════════════════════════════════════╗
   ║  SECTION 8: UTILITIES                                         ║
   ║  removeDialog / applyJson / loadSample / resetSim / log / bindKeys / esc║
   ╚══════════════════════════════════════════════════════════════╝ */
function removeDialog(){
  const e=$('ov');    if(e) e.remove();
  const m=$('mrWiz'); if(m) m.remove();
  const t=$('tlWiz'); if(t) t.remove();
}

/* ── JSON エディター ── */
function applyJson() {
  const ed=$('ed'), em=$('errmsg');
  try {
    const p=JSON.parse(ed.value);
    for(const m of['stills','movie']){
      if(!p[m]?.tabs) throw new Error(`"${m}.tabs" が見つかりません`);
      for(const t of p[m].tabs){
        if(!t.id||!Array.isArray(t.pages)) throw new Error(`[${m}] タブ "${t.id||'?'}" に pages が必要です`);
        for(const pg of t.pages)
          if(!Array.isArray(pg.items)) throw new Error(`[${m}] "${t.id}" ページ ${pg.page} に items が必要です`);
      }
    }
    DEF=p; ed.classList.remove('err'); em.classList.remove('show');
    resetSim(); addLog('info','✓ LOAD',L('load_ok'));
  } catch(e){ ed.classList.add('err'); em.textContent='⚠ '+e.message; em.classList.add('show'); }
}

function loadSample(){
  DEF=JSON.parse(JSON.stringify(SAMPLE));
  $('ed').value=JSON.stringify(SAMPLE,null,2);
  $('errmsg').classList.remove('show'); $('ed').classList.remove('err');
  resetSim();
}

function resetSim(){
  tabIdx=0;pageIdx=0;rowIdx=0;inDialog=false;removeDialog();render();
  addLog('info','RESET',L('reset_msg'));
}

/* ── ログ ── */
function addLog(type,action,msg){
  const p=$('logp'), ts=new Date().toTimeString().slice(0,8);
  const el=document.createElement('div'); el.className=`le l-${type}`;
  el.innerHTML=`<span class="lts">${ts}</span><span class="la">${esc(action)}</span><span class="lm">${esc(msg)}</span>`;
  p.appendChild(el); p.scrollTop=p.scrollHeight;
}
function clearLog(){ $('logp').innerHTML=''; }

/* ── キーバインド ── */
function bindKeys(){
  document.addEventListener('keydown',e=>{
    if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    const map={
      ArrowUp:navUp,ArrowDown:navDown,ArrowLeft:navLeft,ArrowRight:navRight,
      Enter:execEnter,Escape:execBack,Backspace:execBack,
      m:()=>switchMode(mode==='stills'?'movie':'stills'),
      M:()=>switchMode(mode==='stills'?'movie':'stills'),
      l:()=>setLang(lang==='ja'?'en':'ja'),
      L:()=>setLang(lang==='ja'?'en':'ja'),
    };
    if(map[e.key]){e.preventDefault();map[e.key]();}
  });
}
function bindButtons(){
  document.querySelectorAll('.cb').forEach(btn=>{
    const fn={up:navUp,down:navDown,left:navLeft,right:navRight,enter:execEnter,back:execBack}[btn.dataset.k];
    if(!fn) return;
    btn.addEventListener('click',()=>{fn();flashBtn(btn);});
  });
}
function flashBtn(btn){ btn.classList.add('fl'); setTimeout(()=>btn.classList.remove('fl'),120); }

/* ── スクリーンショット機能 (SVG foreignObject + Canvas → PNG) ──
   外部ライブラリ不要。`#lcd` の現在の DOM を SVG に埋め込み、
   ドキュメント全体の <style> も注入してスタイルを再現する。 */
function takeScreenshot(){
  try {
    const lcd = document.getElementById('lcd');
    if(!lcd) throw new Error('LCD not found');
    const rect = lcd.getBoundingClientRect();
    const W = Math.round(rect.width), H = Math.round(rect.height);

    /* DOM をクローン（element 参照を切り離してシリアライズ可能に） */
    const clone = lcd.cloneNode(true);
    /* インラインで現在の transform/scroll に依存しない位置に固定 */
    clone.style.margin = '0';
    clone.style.transform = 'none';

    /* ドキュメント内の <style> を結合（外部CSSは無いので <style> のみで十分） */
    const styles = Array.from(document.querySelectorAll('style'))
      .map(s => s.textContent).join('\n');

    /* XHTML としてシリアライズ */
    const xml = new XMLSerializer().serializeToString(clone);

    /* SVG 構築。foreignObject 内に xhtml namespace を明示
       外側の div で xmlns を宣言すれば子孫要素に継承される */
    const svg =
      `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`+
        `<foreignObject width="100%" height="100%">`+
          `<div xmlns="http://www.w3.org/1999/xhtml" style="width:${W}px;height:${H}px;">`+
            `<style>${styles}</style>`+
            xml+
          `</div>`+
        `</foreignObject>`+
      `</svg>`;

    /* Blob URL は Chrome で tainted canvas エラーになるため、
       data URL（utf-8 % エンコード）を使用して同一オリジン扱いにする */
    const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    const img = new Image();
    img.onload = () => {
      try {
        /* デバイスピクセル比を考慮（高DPI対応） */
        const dpr = window.devicePixelRatio || 1;
        const canvas = document.createElement('canvas');
        canvas.width  = W * dpr;
        canvas.height = H * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        /* 黒背景（液晶画面の背景色） */
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        ctx.drawImage(img, 0, 0, W, H);

        /* PNG ダウンロード */
        canvas.toBlob(b => {
          const a = document.createElement('a');
          const ts = new Date();
          const pad = n => String(n).padStart(2,'0');
          const fname = `dilc-menu-${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}-${pad(ts.getHours())}${pad(ts.getMinutes())}${pad(ts.getSeconds())}.png`;
          a.download = fname;
          a.href = URL.createObjectURL(b);
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
          addLog('set','📸 SS', fname);
        }, 'image/png');
      } catch(err) {
        addLog('back','📸 SS', L('screenshot_err')+': '+err.message);
        console.error('Screenshot error:', err);
      }
    };
    img.onerror = (e) => {
      addLog('back','📸 SS', L('screenshot_err'));
      console.error('Image load error:', e);
    };
    img.src = url;
  } catch(err) {
    addLog('back','📸 SS', L('screenshot_err')+': '+err.message);
    console.error('Screenshot error:', err);
  }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
